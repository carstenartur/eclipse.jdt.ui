name: Restore Multi-File Scope Patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-multifile-scope-expansion
          fetch-depth: 0
      - name: Restore reviewed patch files
        run: |
          set -euo pipefail
          git fetch origin refs/pull/94/head:refs/remotes/origin/pr-94-head
          PATCH_COMMIT=refs/remotes/origin/pr-94-head
          git checkout "$PATCH_COMMIT" -- \
            'org.eclipse.jdt.ui/core extension/org/eclipse/jdt/internal/corext/fix/CleanUpRefactoring.java' \
            'org.eclipse.jdt.ui.tests/ui/org/eclipse/jdt/ui/tests/quickfix/MultiFileCleanUpScopeExpansionTest.java'
          for path in \
            'org.eclipse.jdt.ui/core extension/org/eclipse/jdt/internal/corext/fix/CleanUpRefactoring.java' \
            'org.eclipse.jdt.ui.tests/ui/org/eclipse/jdt/ui/tests/quickfix/MultiFileCleanUpScopeExpansionTest.java'; do
            grep -Fqx "$path" .github/fork-specific-files.txt || printf '%s\n' "$path" >> .github/fork-specific-files.txt
          done
      - name: Commit restored patch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/fork-specific-files.txt \
            'org.eclipse.jdt.ui/core extension/org/eclipse/jdt/internal/corext/fix/CleanUpRefactoring.java' \
            'org.eclipse.jdt.ui.tests/ui/org/eclipse/jdt/ui/tests/quickfix/MultiFileCleanUpScopeExpansionTest.java'
          git commit -m 'Restore fork-specific multi-file cleanup scope expansion'
          git push origin HEAD:fix/restore-multifile-scope-expansion
